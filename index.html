<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TYPE</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7fb;
      color: #090909;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #ffffff 0%, #f6f7fb 56%, #e8edf3 100%);
      color: #090909;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero,
    .reveal {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .hero {
      min-height: 125vh;
    }

    .reveal {
      min-height: 95vh;
    }

    .wrap {
      width: min(100%, 640px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }

    .mark {
      width: min(100%, 340px);
      aspect-ratio: 1 / 1;
      object-fit: contain;
      image-rendering: auto;
      mix-blend-mode: multiply;
    }

    h1 {
      margin: 0;
      font-size: 4.4rem;
      font-weight: 900;
      line-height: 0.92;
    }

    p {
      margin: 0;
      line-height: 1.5;
    }

    .lead {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .subcopy {
      max-width: 28rem;
      font-size: 0.98rem;
      font-weight: 500;
      color: #30343a;
    }

    @media (max-width: 640px) {
      .hero,
      .reveal {
        padding: 28px 16px;
      }

      .hero {
        min-height: 120vh;
      }

      .reveal {
        min-height: 88vh;
      }

      .wrap {
        gap: 14px;
      }

      .mark {
        width: min(100%, 260px);
      }

      h1 {
        font-size: 3rem;
      }

      p {
        font-size: 1rem;
      }

      .subcopy {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="TYPE">
      <div class="wrap">
        <img class="mark" src="typegif.gif" alt="TYPE animated mark">
        <h1>TYPE</h1>
        <p class="lead">CA: coming soon...</p>
      </div>
    </section>
    <section class="reveal" aria-label="More TYPE">
      <div class="wrap">
        <p class="subcopy">The dots are moving. TYPE is almost here.</p>
      </div>
    </section>
  </main>
</body>
</html>
